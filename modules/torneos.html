<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneos – Chema Pádel</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    /* ══ ESTILOS TORNEOS ══════════════════════════════════════ */

    /* Chip de tipo */
    .tipo-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; white-space: nowrap;
    }
    .tipo-robin     { background: #e8f4fd; color: #1a6fa8; }
    .tipo-americano { background: #eafaf1; color: #1e8449; }
    .tipo-mexicano  { background: #fef9e7; color: #9a7d0a; }
    .tipo-escalera  { background: #f4ecf7; color: #76448a; }

    .badge-programado  { background: #eaf4fb; color: #1a5276; }
    .badge-en-curso    { background: #fdebd0; color: #935116; }
    .badge-finalizado  { background: #d5f5e3; color: #1e8449; }

    /* Card torneo en lista */
    .torneo-card {
      background: var(--blanco);
      border-radius: var(--radio);
      box-shadow: var(--sombra-sm);
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color var(--trans), box-shadow var(--trans);
      animation: fadeUp 0.2s ease both;
      margin-bottom: 8px;
    }
    .torneo-card.expanded { border-color: var(--azul); box-shadow: var(--sombra); }

    .torneo-compact {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      cursor: pointer; user-select: none;
    }
    .torneo-compact:active { background: var(--fondo); }

    .torneo-tipo-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--azul-suave);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }

    /* Panel expandido de la tarjeta torneo */
    .torneo-expanded {
      display: none;
      padding: 0 14px 16px;
      border-top: 1px solid var(--gris-5);
      animation: fadeIn 0.15s ease;
    }
    .torneo-card.expanded .torneo-expanded { display: block; }
    .torneo-card.expanded .torneo-chevron { transform: rotate(180deg); color: var(--azul); }

    /* Top 3 clasificados mini */
    .top3-row {
      display: flex; gap: 8px; margin: 12px 0 10px;
    }
    .top3-item {
      flex: 1; text-align: center;
      background: var(--fondo); border-radius: 10px;
      padding: 8px 6px;
      border: 1px solid var(--gris-5);
    }
    .top3-medal { font-size: 1.2rem; display: block; }
    .top3-nombre { font-size: 0.72rem; font-weight: 700; color: var(--gris-1); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top3-pts { font-size: 0.68rem; color: var(--azul); font-weight: 700; }

    .torneo-info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 16px; padding: 10px 0 12px;
      border-top: 1px solid var(--gris-5);
    }
    .torneo-info-grid .field-label { font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gris-3); }
    .torneo-info-grid .field-value { font-size: 0.84rem; color: var(--negro); font-weight: 600; }

    .torneo-actions {
      display: flex; gap: 8px;
      padding-top: 10px; border-top: 1px solid var(--gris-5);
    }

    /* ══ VISTA INTERIOR TORNEO ══ */
    #vistaInterior { display: none; }

    .torneo-header-bar {
      background: linear-gradient(135deg, var(--azul), var(--azul-dark));
      color: var(--blanco);
      padding: 14px 16px;
      border-radius: var(--radio);
      margin-bottom: 14px;
      box-shadow: var(--sombra-azul);
    }
    .torneo-header-bar h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      color: var(--blanco); margin-bottom: 4px;
    }
    .torneo-header-bar p { font-size: 0.78rem; color: rgba(255,255,255,0.8); }

    /* Navegación jornadas */
    .jornada-nav {
      display: flex; align-items: center; gap: 10px;
      background: var(--blanco);
      border-radius: var(--radio-sm);
      padding: 10px 14px;
      box-shadow: var(--sombra-sm);
      margin-bottom: 14px;
    }
    .jornada-nav button {
      width: 34px; height: 34px;
      border: 2px solid var(--gris-4);
      border-radius: 8px; background: var(--blanco);
      font-size: 1rem; cursor: pointer;
      transition: all var(--trans); flex-shrink: 0;
    }
    .jornada-nav button:hover:not(:disabled) { border-color: var(--azul); color: var(--azul); }
    .jornada-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
    .jornada-nav select {
      flex: 1; padding: 8px 10px;
      border: 2px solid var(--gris-4);
      border-radius: var(--radio-sm);
      font-family: inherit; font-size: 0.88rem;
      font-weight: 700; text-align: center;
      background: var(--blanco); cursor: pointer;
      outline: none;
    }

    /* Tarjeta de partido */
    .partido-card {
      background: var(--blanco);
      border-radius: var(--radio);
      box-shadow: var(--sombra-sm);
      margin-bottom: 10px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color var(--trans);
    }
    .partido-card.finalizado { border-color: var(--verde); }

    .partido-pista {
      background: linear-gradient(90deg, var(--azul-suave), var(--verde-suave));
      color: var(--azul);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .partido-body { padding: 12px 14px; }

    .partido-equipos {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .equipo {
      flex: 1; text-align: center;
      font-weight: 700; font-size: 0.85rem;
      line-height: 1.3;
    }
    .vs-badge {
      background: var(--gris-5); color: var(--gris-3);
      padding: 4px 10px; border-radius: 6px;
      font-weight: 800; font-size: 0.78rem;
      flex-shrink: 0;
    }

    .partido-scores {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .score-input {
      flex: 1; text-align: center;
      padding: 10px 6px;
      border: 2px solid var(--gris-4);
      border-radius: var(--radio-sm);
      font-family: 'Bebas Neue', cursive;
      font-size: 1.6rem; letter-spacing: 1px;
      background: var(--gris-5);
      outline: none;
      transition: border-color var(--trans);
    }
    .score-input:focus { border-color: var(--verde); background: var(--blanco); }
    .score-input.ganador { border-color: var(--verde); background: var(--verde-suave); color: var(--verde-dark); }
    .score-input.perdedor { border-color: var(--gris-4); }
    .score-sep {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem; color: var(--gris-3);
    }

    .partido-btns {
      display: flex; gap: 8px;
    }

    /* Clasificación */
    .clasificacion-table {
      width: 100%; border-collapse: collapse;
      font-size: 0.82rem;
      background: var(--blanco);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra-sm);
      margin-bottom: 14px;
    }
    .clasificacion-table th {
      background: linear-gradient(90deg, var(--azul-suave), var(--verde-suave));
      color: var(--azul);
      padding: 8px 10px; text-align: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .clasificacion-table th:first-child { text-align: left; }
    .clasificacion-table td {
      padding: 9px 10px; border-bottom: 1px solid var(--gris-5);
      text-align: center;
    }
    .clasificacion-table td:nth-child(2) { text-align: left; font-weight: 600; }
    .clasificacion-table tr:last-child td { border-bottom: none; }
    .clasificacion-table tr:nth-child(even) td { background: var(--gris-5); }
    .pos-medal { font-size: 1rem; }

    /* Botones de control del torneo */
    .torneo-controls {
      display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }

    /* Roles Escalera */
    .rol-estrella { color: #f39c12; }
    .rol-promesa  { color: #8e44ad; }

    /* Modal crear torneo */
    .participante-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--gris-5);
    }
    .participante-row:last-child { border-bottom: none; }
    .participante-num {
      width: 24px; font-weight: 700;
      color: var(--gris-3); font-size: 0.85rem;
      text-align: right; flex-shrink: 0;
    }
    .participante-row input {
      flex: 1; padding: 7px 10px;
      border: 2px solid var(--gris-5);
      border-radius: 6px; font-family: inherit; font-size: 0.88rem;
      background: var(--gris-5); outline: none;
    }
    .participante-row input:focus { border-color: var(--verde); background: var(--blanco); }
    .rol-btn {
      padding: 5px 10px; border-radius: 20px; border: none;
      font-size: 0.85rem; cursor: pointer; flex-shrink: 0;
      transition: all var(--trans);
    }
    .participantes-container { max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>

  <header class="app-header">
    <a href="../index.html" class="header-logo" style="text-decoration:none;" id="headerLogoLink">
      <div>
        <img src="../icons/logo.jpg" alt="Logo" style="height:38px;width:auto;object-fit:contain;border-radius:6px;" /><span class="logo-text">🎾 Chema Pádel</span>
        <span class="logo-sub" id="headerSub">🏆 Torneos</span>
      </div>
    </a>
    <div class="header-actions">
      <button class="btn-icon" id="btnVolver" onclick="volverALista()" title="Volver" style="display:none;">←</button>
      <button class="btn-icon" onclick="history.back()" id="btnHistoryBack" title="Volver">←</button>
    </div>
  </header>

  <main class="page-wrapper">

    <!-- ══ VISTA LISTA ══ -->
    <div id="vistaLista">
      <div class="section-header">
        <h2 class="section-title">🏆 Torneos</h2>
        <span class="section-count" id="sectionCount">0 torneos</span>
      </div>

      <!-- Buscador por jugador -->
      <div class="search-bar" style="margin-bottom:10px;">
        <span class="search-icon">👤</span>
        <input type="text" id="searchJugador" placeholder="Buscar por jugador…"
          oninput="filtroJugador=this.value;renderLista()" />
      </div>

      <!-- Filtro por grupo -->
      <div style="margin-bottom:10px;">
        <select id="filtroGrupoSelect"
          onchange="filtroGrupoId=this.value;renderLista()"
          style="width:100%;padding:10px 12px;border:2px solid var(--gris-4);
          border-radius:var(--radio-sm);font-family:inherit;font-size:.88rem;
          background:var(--blanco);outline:none;">
          <option value="">👨‍👩‍👧‍👦 Todos los grupos</option>
        </select>
      </div>

      <!-- Filtros por tipo -->
      <div class="filter-bar" id="filterTipo" style="margin-bottom:10px;">
        <button class="filter-chip active" onclick="setFiltroTipo(this,\'\')">Todos</button>
        <button class="filter-chip" onclick="setFiltroTipo(this,\'Round Robin\')">🔄 Robin</button>
        <button class="filter-chip" onclick="setFiltroTipo(this,\'Americano\')">🇺🇸 Americano</button>
        <button class="filter-chip" onclick="setFiltroTipo(this,\'Mexicano\')">🇲🇽 Mexicano</button>
        <button class="filter-chip" onclick="setFiltroTipo(this,\'Escalera\')">🪜 Escalera</button>
      </div>

      <div id="listaTorneos"></div>
    </div>

    <!-- ══ VISTA INTERIOR TORNEO ══ -->
    <div id="vistaInterior">

      <div class="torneo-header-bar">
        <h3 id="torneoNombreHeader">—</h3>
        <p id="torneoInfoHeader">—</p>
      </div>

      <!-- Navegación jornadas -->
      <div class="jornada-nav" id="jornadaNav">
        <button id="btnJornadaAnterior" onclick="cambiarJornada(-1)">◀</button>
        <select id="selJornada" onchange="renderJornada(parseInt(this.value))"></select>
        <button id="btnJornadaSiguiente" onclick="cambiarJornada(1)">▶</button>
      </div>

      <!-- Partidos de la jornada actual -->
      <div id="partidosContainer"></div>

      <!-- Botones de control -->
      <div class="torneo-controls" id="torneoControls"></div>

      <!-- Clasificación -->
      <div style="font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:1.5px;margin-bottom:8px;">
        📊 Clasificación
      </div>
      <div id="clasificacionContainer"></div>
    </div>

  </main>

  <!-- FAB -->
  <button class="fab" id="fabBtn" onclick="abrirModal()" title="Nuevo torneo">＋</button>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="../index.html"><span class="nav-icon">🏠</span><span class="nav-label">Inicio</span></a>
    <a class="nav-item" href="alumnos.html"><span class="nav-icon">👥</span><span class="nav-label">Alumnos</span></a>
    <a class="nav-item" href="grupos.html"><span class="nav-icon">👨‍👩‍👧‍👦</span><span class="nav-label">Grupos</span></a>
    <a class="nav-item" href="ejercicios.html"><span class="nav-icon">🎾</span><span class="nav-label">Ejercicios</span></a>
    <a class="nav-item" href="clases.html"><span class="nav-icon">📅</span><span class="nav-label">Clases</span></a>
    <a class="nav-item active" href="torneos.html"><span class="nav-icon">🏆</span><span class="nav-label">Torneos</span></a>
    <a class="nav-item" href="estadisticas.html"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></a>
  </nav>

  <!-- ══ MODAL CREAR TORNEO ══ -->
  <div class="modal-overlay" id="modalOverlay" onclick="cerrarModalOverlay(event)">
    <div class="modal-sheet" style="max-height:94vh;">
      <div class="modal-handle"></div>
      <h3 class="modal-title">🏆 Nuevo Torneo</h3>

      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" id="fNombre" placeholder="Ej: Torneo de Navidad" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tipo *</label>
          <select id="fTipo" onchange="onTipoChange()">
            <option value="Americano">🇺🇸 Americano</option>
            <option value="Mexicano">🇲🇽 Mexicano</option>
            <option value="Round Robin">🔄 Round Robin</option>
            <option value="Escalera">🪜 Escalera</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha *</label>
          <input type="date" id="fFecha" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Hora</label>
          <input type="time" id="fHora" />
        </div>
        <div class="form-group">
          <label>Pistas</label>
          <select id="fPistas" onchange="onPistasChange()">
            <option value="1">1 pista</option>
            <option value="2" selected>2 pistas</option>
            <option value="3">3 pistas</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Sistema puntuación</label>
          <select id="fSistema">
            <option value="puntos">Puntos</option>
            <option value="juegos">Juegos</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="fCantidad" placeholder="Ej: 24" min="1" max="99" value="24" />
        </div>
      </div>

      <div class="form-group">
        <label>Duración aproximada</label>
        <select id="fDuracion">
          <option value="">—</option>
          <option value="60 min">60 min</option>
          <option value="90 min">90 min</option>
          <option value="2 horas">2 horas</option>
          <option value="3 horas">3 horas</option>
        </select>
      </div>

      <!-- Participantes -->
      <div class="form-group">
        <label id="labelParticipantes">Participantes (8)</label>
        <div class="participantes-container" id="participantesContainer"></div>
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="crearTorneo()">🏆 Crear torneo</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="../data/store.js"></script>
  <script src="torneos.js"></script>
</body>
</html>
